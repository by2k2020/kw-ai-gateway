name: Keep Streamlit Cloud Alive

on:
  schedule:
    - cron: "*/30 * * * *"  # 매 30분
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit health endpoint
        # health 엔드포인트는 인증·리다이렉트 없이 200 반환 (Streamlit 표준)
        # 실패해도 워크플로우는 성공 처리 (curl exit 무시)
        run: |
          URL="https://kw-ai-gateway.streamlit.app/_stcore/health"
          echo "▸ ping $URL"
          STATUS=$(curl -s -m 30 -o /tmp/r.txt -w "%{http_code}" "$URL" || echo "timeout")
          BODY=$(cat /tmp/r.txt 2>/dev/null || echo "-")
          echo "▸ HTTP $STATUS  body: $BODY"

          # 메인 페이지도 한 번 — 슬립이면 깨우기 트리거
          URL2="https://kw-ai-gateway.streamlit.app/"
          echo "▸ trigger wake $URL2"
          curl -s -m 30 --max-redirs 3 -o /dev/null -w "  main HTTP %{http_code} %{time_total}s\n" "$URL2" || echo "  (timeout — sleep 깨우는 중일 수 있음, 다음 cron에서 재시도)"

          echo "✅ done"
        continue-on-error: true
