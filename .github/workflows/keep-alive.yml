name: Keep Streamlit Cloud Alive

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping (실패 무시)
        shell: bash
        run: |
          set +e
          URL="https://kw-ai-gateway.streamlit.app/_stcore/health"
          echo "▸ ping $URL"
          curl -s -m 20 --max-redirs 0 -o /dev/null -w "  HTTP %{http_code}\n" "$URL"

          # 메인 페이지도 trigger
          URL2="https://kw-ai-gateway.streamlit.app/"
          echo "▸ trigger $URL2"
          curl -s -m 20 --max-redirs 0 -o /dev/null -w "  HTTP %{http_code}\n" "$URL2"

          echo "✅ done"
          exit 0
